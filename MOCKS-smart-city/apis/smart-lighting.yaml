openapi: 3.0.2
info:
  title: Smart Lighting and Energy API
  version: '1.0'
  description: >
    API for managing, monitoring, and controlling the urban street lighting infrastructure. 
    Supports zone-based control (zoneId), allowing the orchestration engine to dynamically adjust lighting 
    brightness across entire city districts in response to traffic incidents, pedestrian density, or severe weather conditions.
  contact:
    name: Smart City Development Team
servers:
  - url: http://localhost:8585/rest/Smart+Lighting+and+Energy+API/1.0
    description: Mock server generated by Microcks
components:
  schemas:
    ResponseStatus:
      type: object
      properties:
        status:
          type: string
        httpCode:
          type: integer
        message:
          type: string
      required:
        - status
        - httpCode
        - message
    Light:
      allOf:
        - $ref: '#/components/schemas/NewLight'
        - properties:
            id:
              type: integer
              format: int64
              description: Unique, auto-generated database identifier for the street light pole.
          required:
            - id
    NewLight:
      type: object
      properties:
        zoneId:
          type: string
          description: Standardized city zone identifier (e.g., Z-CENTRO, Z-NORD)
        location:
          type: string
          description: Precise physical location or topographical reference of the light pole (e.g., street name).
        status:
          type: string
          enum: [on, off, malfunctioning]
          description: Current operational state of the light emitting unit.
        brightness:
          type: integer
          description: Current dimming or brightness level expressed as a percentage (0 = off, 100 = maximum output).
        energyConsumption:
          type: number
          format: float
          description: Accumulated energy usage in kilowatt-hours (kWh) over the current monitoring cycle.
        smartEnabled:
          type: boolean
          description: Flag indicating if the pole is equipped with autonomous smart sensors.
      required:
        - zoneId
        - location
        - status
        - brightness
        - energyConsumption
        - smartEnabled
paths:
  /health:
    get:
      description: Performs a shallow health check to verify that the Smart Lighting microservice is reachable and responsive.
      summary: Health check endpoint
      responses:
        '200':
          description: Successful health check response
          content:
            application/json:
              schema:
                type: object
              examples:
                healthy:
                  value: {}
  /light:
    get:
      description: Retrieves a list of smart street lights. Use query parameters to filter by zone or operational status.
      summary: Search smart lights
      parameters:
        - name: zoneId
          in: query
          schema:
            type: string
          description: Filter lights by a specific zone ID (e.g., Z-CENTRO)
          examples:
            by_zone_centro:
              value: "Z-CENTRO"
        - name: status
          in: query
          schema:
            type: string
          description: Filter by status (e.g., malfunctioning to find broken lights)
          examples:
            by_status_malfunctioning:
              value: "malfunctioning"
      responses:
        "200":
          description: A JSON array containing the list of registered smart lights.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Light'
              examples:
                example_list:
                  value:
                    - id: 101
                      zoneId: Z-CENTRO
                      location: "Corso Garibaldi - Palo 12, Benevento"
                      status: "on"
                      brightness: 80
                      energyConsumption: 1.25
                      smartEnabled: true
                    - id: 102
                      zoneId: Z-NORD
                      location: "Viale San Lorenzo - Palo 5, Benevento"
                      status: "off"
                      brightness: 0
                      energyConsumption: 0.0
                      smartEnabled: false
                by_zone_centro:
                  value:
                    - id: 101
                      zoneId: Z-CENTRO
                      location: "Corso Garibaldi - Palo 12, Benevento"
                      status: "on"
                      brightness: 80
                      energyConsumption: 1.25
                      smartEnabled: true
                by_status_malfunctioning:
                  value:
                    - id: 105
                      zoneId: Z-SUD
                      location: "Via Mustilli - Palo 3, Benevento"
                      status: "malfunctioning"
                      brightness: 0
                      energyConsumption: 0.0
                      smartEnabled: true
    post:
      description: Registers a newly installed smart light pole into the city's infrastructure grid.
      summary: Register new smart light
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewLight'
            examples:
              new_light:
                value:
                  zoneId: Z-CENTRO
                  location: "Piazza Santa Sofia - Palo 7, Benevento"
                  status: "on"
                  brightness: 90
                  energyConsumption: 1.35
                  smartEnabled: true
      responses:
        "201":
          description: Smart light successfully registered and added to the grid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Light'
              examples:
                created:
                  value:
                    id: 103
                    zoneId: Z-CENTRO
                    location: "Piazza Santa Sofia - Palo 7, Benevento"
                    status: "on"
                    brightness: 90
                    energyConsumption: 1.35
                    smartEnabled: true
  /light/{id}:
    get:
      description: Fetches real-time telemetry and configuration data for a specific street light by its unique identifier.
      summary: Get smart light details by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          examples:
            light_101:
              value: 101
      responses:
        "200":
          description: Detailed information about the requested smart light.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Light'
              examples:
                light_101:
                  value:
                    id: 101
                    zoneId: Z-CENTRO
                    location: "Corso Garibaldi - Palo 12, Benevento"
                    status: "on"
                    brightness: 80
                    energyConsumption: 1.25
                    smartEnabled: true
        "404":
          description: The specified smart light ID does not exist in the registry.
    put:
      description: Updates the configuration or status of a specific smart light.
      summary: Update smart light by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          examples:
            updated:
              value: 101
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewLight'
            examples:
              update:
                value:
                  zoneId: Z-CENTRO
                  location: "Corso Garibaldi - Palo 12, Benevento"
                  status: "off"
                  brightness: 0
                  energyConsumption: 0.0
                  smartEnabled: true
      responses:
        "200":
          description: Smart light data successfully updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Light'
              examples:
                updated:
                  value:
                    id: 101
                    zoneId: Z-CENTRO
                    location: "Corso Garibaldi - Palo 12, Benevento"
                    status: "off"
                    brightness: 0
                    energyConsumption: 0.0
                    smartEnabled: true
        "404":
          description: The specified smart light ID was not found.
    delete:
      description: Permanently removes a smart light pole from the city's infrastructure registry.
      summary: Delete smart light by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          examples:
            deleted:
              value: 101
      responses:
        "204":
          description: The smart light was successfully deleted from the system. No content is returned.
          content:
            text/plain:
              examples:
                deleted:
                  value: "Smart light deleted"
        "404":
          description: The specified smart light ID was not found.
  /light/zone/{zoneId}/brightness:
    put:
      description: Dynamically adjust the brightness level for all smart street lights within a specific zone. Extremely useful for reacting to emergencies, traffic conditions, or energy-saving schedules.
      summary: Set brightness for an entire zone
      parameters:
        - name: zoneId
          in: path
          required: true
          schema:
            type: string
          examples:
            zone_centro:
              value: Z-CENTRO
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                brightness:
                  type: integer
                  description: New brightness level percentage (0 to 100)
                reason:
                  type: string
                  description: Reason for the change (e.g., EMERGENCY, WEATHER_HAZARD, ENERGY_SAVING)
            examples:
              emergency_lighting:
                value:
                  brightness: 100
                  reason: EMERGENCY_VISIBILITY_REQUIRED
      responses:
        "200":
          description: Zone brightness successfully updated.
          content:
            text/plain:
              examples:
                success:
                  value: Zone brightness updated
  /register:
    post:
      description: Automatically registers this microservice with the central discovery system (e.g., Consul) to enable inter-service communication.
      summary: Register service with discovery system
      responses:
        "200":
          description: Service successfully registered with the discovery node.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseStatus'
              examples:
                ok:
                  value:
                    status: "success"
                    httpCode: 200
                    message: "Service registered"
        "500":
          description: Internal server error preventing successful registration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseStatus'
              examples:
                fail:
                  value:
                    status: "error"
                    httpCode: 500
                    message: "Unable to register to Consul"