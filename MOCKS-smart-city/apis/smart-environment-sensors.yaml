openapi: 3.0.2
info:
  title: Smart Environment and Temperature Sensors API
  version: '1.0'
  description: >
    API for environmental monitoring across the city. Provides real-time data on ambient temperature (Celsius), air quality (AQI), humidity, noise, and weather alerts. 
    Crucial for querying weather conditions or triggering cross-domain actions (e.g., imposing traffic limits during high pollution or frost). 
    Supports querying by standardized city zone and active alert status.
  contact:
    name: Smart City Development Team
servers:
  - url: http://localhost:8585/rest/Smart+Environment+and+Temperature+Sensors+API/1.0
    description: Mock server generated by Microcks
components:
  schemas:
    ResponseStatus:
      type: object
      properties:
        status:
          type: string
        httpCode:
          type: integer
        message:
          type: string
      required:
        - status
        - httpCode
        - message
    Sensor:
      allOf:
        - $ref: '#/components/schemas/NewSensor'
        - properties:
            id:
              type: integer
              format: int64
              description: Unique identifier for the sensor device
          required:
            - id
    NewSensor:
      type: object
      properties:
        zoneId:
          type: string
          description: Standardized city zone identifier (e.g., Z-CENTRO, Z-NORD)
        location:
          type: string
          description: Physical location or exact address of the sensor
        sensorType:
          type: string
          enum:
            - temperature
            - humidity
            - air_quality
            - noise
            - light
            - pressure
            - wind_speed
          description: Type of environmental metric tracked by the sensor
        lastReading:
          type: number
          format: float
          description: Most recent sensor reading value (e.g., the actual temperature degrees)
        readingUnit:
          type: string
          enum:
            - 'Celsius'
            - '%'
            - AQI
            - dB
            - lux
            - hPa
            - km/h
          description: Unit of measurement for the last reading
        threshold:
          type: number
          format: float
          description: Alert threshold value for the sensor reading
        alertActive:
          type: boolean
          description: True if the current reading exceeds safe thresholds (triggers an alert)
        alertReason:
          type: string
          description: Specific reason for the alert if active (e.g., HIGH_POLLUTION, FROST_WARNING, NONE)
        batteryLevel:
          type: integer
          minimum: 0
          maximum: 100
          description: Battery level of the sensor device (0-100)
        lastUpdated:
          type: string
          format: date-time
          description: Timestamp of the last reading update
        status:
          type: string
          enum:
            - active
            - inactive
            - maintenance
            - low_battery
            - fault
          description: Current sensor operational status
      required:
        - zoneId
        - location
        - sensorType
        - lastReading
        - readingUnit
        - threshold
        - alertActive
        - alertReason
        - batteryLevel
        - lastUpdated
        - status
paths:
  /health:
    get:
      description: Health check endpoint to verify if the Smart Sensors API service is running and responsive
      summary: Health check
      responses:
        '200':
          description: Successful health check response
          content:
            application/json:
              schema:
                type: object
              examples:
                healthy:
                  value: {}
  /sensor:
    get:
      description: Retrieve environmental sensors deployed across the city. Use query parameters to find current ambient temperature, air quality, or active weather alerts for specific zones.
      summary: Search environmental and temperature sensors
      parameters:
        - name: zoneId
          in: query
          schema:
            type: string
          description: Filter sensors by a specific zone ID (e.g., Z-CENTRO)
          examples:
            by_zone_centro:
              value: "Z-CENTRO"
        - name: alertActive
          in: query
          schema:
            type: boolean
          description: If true, returns only sensors currently triggering an alert
          examples:
            alert_active_true:
              value: true
        - name: sensorType
          in: query
          schema:
            type: string
          description: Filter by sensor type (e.g., temperature, air_quality)
      responses:
        '200':
          description: List of sensor devices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Sensor'
              examples:
                example_list:
                  value:
                    - id: 1
                      zoneId: Z-CENTRO
                      location: Duomo di Benevento, Piazza Duomo, Benevento
                      sensorType: air_quality
                      lastReading: 150.5
                      readingUnit: AQI
                      threshold: 100.0
                      alertActive: true
                      alertReason: HIGH_POLLUTION
                      batteryLevel: 90
                      lastUpdated: '2025-09-25T10:00:00Z'
                      status: active
                    - id: 2
                      zoneId: Z-NORD
                      location: Stadio Ciro Vigorito, Benevento
                      sensorType: temperature
                      lastReading: 18.2
                      readingUnit: Celsius
                      threshold: 38.0
                      alertActive: false
                      alertReason: NONE
                      batteryLevel: 62
                      lastUpdated: '2025-09-25T09:45:00Z'
                      status: active
                by_zone_centro:
                  value:
                    - id: 1
                      zoneId: Z-CENTRO
                      location: Duomo di Benevento, Piazza Duomo, Benevento
                      sensorType: air_quality
                      lastReading: 150.5
                      readingUnit: AQI
                      threshold: 100.0
                      alertActive: true
                      alertReason: HIGH_POLLUTION
                      batteryLevel: 90
                      lastUpdated: '2025-09-25T10:00:00Z'
                      status: active
                alert_active_true:
                  value:
                    - id: 1
                      zoneId: Z-CENTRO
                      location: Duomo di Benevento, Piazza Duomo, Benevento
                      sensorType: air_quality
                      lastReading: 150.5
                      readingUnit: AQI
                      threshold: 100.0
                      alertActive: true
                      alertReason: HIGH_POLLUTION
                      batteryLevel: 90
                      lastUpdated: '2025-09-25T10:00:00Z'
                      status: active
    post:
      description: Register a new environmental or temperature sensor in the city monitoring network
      summary: Register new sensor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewSensor'
            examples:
              new_sensor:
                value:
                  zoneId: Z-SUD
                  location: Ponte Leproso, Via Appia Antica, Benevento
                  sensorType: humidity
                  lastReading: 61.5
                  readingUnit: '%'
                  threshold: 85.0
                  alertActive: false
                  alertReason: NONE
                  batteryLevel: 100
                  lastUpdated: '2025-09-25T11:15:00Z'
                  status: active
      responses:
        '201':
          description: Sensor device created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Sensor'
              examples:
                created:
                  value:
                    id: 3
                    zoneId: Z-SUD
                    location: Ponte Leproso, Via Appia Antica, Benevento
                    sensorType: humidity
                    lastReading: 61.5
                    readingUnit: '%'
                    threshold: 85.0
                    alertActive: false
                    alertReason: NONE
                    batteryLevel: 100
                    lastUpdated: '2025-09-25T11:15:00Z'
                    status: active
  /sensor/{id}:
    get:
      description: Retrieve the exact real-time temperature, air quality, or specific environmental metric of a single sensor by its ID.
      summary: Get sensor details by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          examples:
            sensor_1:
              value: 1
      responses:
        '200':
          description: Sensor device details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Sensor'
              examples:
                sensor_1:
                  value:
                    id: 1
                    zoneId: Z-CENTRO
                    location: Duomo di Benevento, Piazza Duomo, Benevento
                    sensorType: air_quality
                    lastReading: 150.5
                    readingUnit: AQI
                    threshold: 100.0
                    alertActive: true
                    alertReason: HIGH_POLLUTION
                    batteryLevel: 90
                    lastUpdated: '2025-09-25T10:00:00Z'
                    status: active
        '404':
          description: Sensor not found
    put:
      description: Update the configuration or latest reading (e.g., a new temperature value) of a specific environmental sensor by ID.
      summary: Update sensor by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          examples:
            updated:
              value: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewSensor'
            examples:
              update:
                value:
                  zoneId: Z-CENTRO
                  location: Duomo di Benevento, Piazza Duomo, Benevento
                  sensorType: air_quality
                  lastReading: 95.0
                  readingUnit: AQI
                  threshold: 100.0
                  alertActive: false
                  alertReason: NONE
                  batteryLevel: 88
                  lastUpdated: '2025-09-25T12:00:00Z'
                  status: active
      responses:
        '200':
          description: Sensor device updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Sensor'
              examples:
                updated:
                  value:
                    id: 1
                    zoneId: Z-CENTRO
                    location: Duomo di Benevento, Piazza Duomo, Benevento
                    sensorType: air_quality
                    lastReading: 95.0
                    readingUnit: AQI
                    threshold: 100.0
                    alertActive: false
                    alertReason: NONE
                    batteryLevel: 88
                    lastUpdated: '2025-09-25T12:00:00Z'
                    status: active
        '404':
          description: Sensor not found
    delete:
      description: Remove a specific environmental sensor from the city monitoring network by its ID
      summary: Delete sensor by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          examples:
            deleted:
              value: 1
      responses:
        '204':
          description: Deleted successfully
          content:
            text/plain:
              examples:
                deleted:
                  value: Sensor deleted
        '404':
          description: Sensor not found
  /register:
    post:
      description: Register this service to the discovery system (Consul) to make it available for other city infrastructure components
      summary: Register service with discovery system
      responses:
        '200':
          description: Registration success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseStatus'
              examples:
                ok:
                  value:
                    status: success
                    httpCode: 200
                    message: Service registered
        '500':
          description: Registration failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseStatus'
              examples:
                fail:
                  value:
                    status: error
                    httpCode: 500
                    message: Unable to register to Consul