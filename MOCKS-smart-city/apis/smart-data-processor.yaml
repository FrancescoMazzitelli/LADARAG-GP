openapi: 3.0.2
info:
  title: Smart Data Processor API
  version: '1.0'
  description: "Real microservice (not a mock) that performs post-processing operations\
    \ on data already retrieved by previous pipeline tasks.\nThis service bridges\
    \ the gap between what JMESPath can express inline and what requires actual computation:\
    \ multi-dataset joins, statistical aggregations, multi-criteria ranking, set operations\
    \ (intersect, diff), grouping, and compound filtering.\nThe LLM orchestrator calls\
    \ this service as the final step in a pipeline when it needs to combine or process\
    \ results from two or more previous tasks. All endpoints accept JSON arrays as\
    \ input \u2014 use JMESPath chaining in the 'input' field to pass results from\
    \ previous tasks.\nEndpoints:\n  POST /processor/join        \u2014 inner/left/right\
    \ join of two lists on a common field\n  POST /processor/aggregate   \u2014 avg,\
    \ sum, min, max, count, median, stddev on a field\n  POST /processor/intersect\
    \   \u2014 items in left whose key also appears in right\n  POST /processor/diff\
    \        \u2014 items in left whose key does NOT appear in right\n  POST /processor/group\
    \       \u2014 group list by field \u2192 dict of {key: [items]}\n  POST /processor/rank\
    \        \u2014 multi-criteria weighted ranking with composite score\n  POST /processor/sort\
    \        \u2014 sort by field with optional top-N selection\n  POST /processor/filter\
    \      \u2014 filter with multiple conditions and AND/OR logic\n"
  contact:
    name: Smart City Development Team
servers:
- url: http://localhost:7500
  description: "Smart Data Processor \u2014 integrated into api-importer"
components:
  schemas:
    ResponseStatus:
      type: object
      properties:
        status:
          type: string
        httpCode:
          type: integer
        message:
          type: string
      required:
      - status
      - httpCode
      - message
    JoinRequest:
      type: object
      properties:
        left:
          type: array
          items:
            type: object
          description: First dataset (left side of the join)
        right:
          type: array
          items:
            type: object
          description: Second dataset (right side of the join)
        true:
          type: string
          description: Field name to join on (must exist in both datasets, e.g. 'zoneId')
        type:
          type: string
          enum:
          - inner
          - left
          - right
          description: Join type (default inner)
      required:
      - left
      - right
      - true
    AggregateRequest:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
        field:
          type: string
          description: Numeric field to aggregate (e.g. 'lastReading', 'pricePerHour')
        operations:
          type: array
          items:
            type: string
            enum:
            - avg
            - sum
            - min
            - max
            - count
            - median
            - stddev
          description: List of aggregation operations to compute
        group_by:
          type: string
          description: Optional field to group by before aggregating (e.g. 'zoneId')
      required:
      - data
      - field
      - operations
    IntersectRequest:
      type: object
      properties:
        left:
          type: array
          items:
            type: object
        right:
          type: array
          items:
            type: object
        field:
          type: string
          description: Field whose value must appear in both datasets
      required:
      - left
      - right
      - field
    DiffRequest:
      type: object
      properties:
        left:
          type: array
          items:
            type: object
        right:
          type: array
          items:
            type: object
        field:
          type: string
          description: Field whose value must NOT appear in right
      required:
      - left
      - right
      - field
    GroupRequest:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
        by:
          type: string
          description: Field to group by
        count_only:
          type: boolean
          description: If true, returns only counts per group instead of full items
      required:
      - data
      - by
    RankCriterion:
      type: object
      properties:
        field:
          type: string
          description: Numeric field to use for ranking
        weight:
          type: number
          format: float
          description: Weight of this criterion (0.0-1.0)
        order:
          type: string
          enum:
          - asc
          - desc
          description: asc = lower is better (e.g. price, wait time), desc = higher
            is better (e.g. score)
      required:
      - field
      - weight
      - order
    RankRequest:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
        criteria:
          type: array
          items:
            $ref: '#/components/schemas/RankCriterion'
          description: List of ranking criteria with weights
        top:
          type: integer
          description: Return only the top N results (optional, default all)
      required:
      - data
      - criteria
    SortRequest:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
        by:
          type: string
          description: Field to sort by
        order:
          type: string
          enum:
          - asc
          - desc
          description: Sort direction (default asc)
        top:
          type: integer
          description: Return only top N results after sorting
      required:
      - data
      - by
    FilterCondition:
      type: object
      properties:
        field:
          type: string
        op:
          type: string
          enum:
          - eq
          - neq
          - gt
          - gte
          - lt
          - lte
          - in
          - contains
        value: {}
      required:
      - field
      - op
      - value
    FilterRequest:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
        conditions:
          type: array
          items:
            $ref: '#/components/schemas/FilterCondition'
        logic:
          type: string
          enum:
          - and
          - or
          description: Logical operator between conditions (default and)
      required:
      - data
      - conditions
paths:
  /health:
    get:
      description: Health check for the Smart Data Processor microservice.
      summary: Health check
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
              examples:
                healthy:
                  value:
                    status: ok
                    service: smart-data-processor
  /join:
    post:
      description: "Performs an inner, left, or right join of two lists of objects\
        \ on a common field. Each result item merges fields from both left and right\
        \ objects.\nExample use cases: - Join parking spots (left) with traffic sensors\
        \ (right) on zoneId to get parking with congestion info - Join buildings (left)\
        \ with energy readings (right) on buildingId to get buildings with consumption\
        \ data\nPass previous task results using JMESPath chaining in input:\n  input:\
        \ { \"left\": \"{{get_sensors}}\", \"right\": \"{{get_zones}}\", \"on\": \"\
        zoneId\" }\n"
      summary: Join two datasets on a common field
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JoinRequest'
            examples:
              join_parking_traffic:
                value:
                  left:
                  - id: 101
                    zoneId: Z-CENTRO
                    location: Parcheggio Piazza Risorgimento
                    available: true
                    pricePerHour: 1.0
                  right:
                  - id: 1
                    zoneId: Z-CENTRO
                    congestionLevel: high
                    averageSpeed: 22.5
                  true: zoneId
                  type: inner
              join_buildings_energy:
                value:
                  left:
                  - id: 2
                    zoneId: Z-CENTRO
                    name: Biblioteca Comunale
                    buildingType: public
                  right:
                  - id: 1
                    buildingId: 2
                    currentConsumptionKW: 82.0
                    status: normal
                  true: id
                  type: left
      responses:
        '200':
          description: Merged list of objects from both datasets
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
              examples:
                result:
                  value:
                  - id: 101
                    zoneId: Z-CENTRO
                    location: Parcheggio Piazza Risorgimento
                    available: true
                    pricePerHour: 1.0
                    congestionLevel: high
                    averageSpeed: 22.5
        '400':
          description: Invalid request body
  /aggregate:
    post:
      description: 'Computes statistical aggregations on a numeric field of a dataset.
        Supports avg, sum, min, max, count, median, stddev. With group_by, computes
        statistics per group (e.g., avg AQI per zone).

        Example use cases: - Find average air quality reading across all high-traffic
        zones - Count how many parking spots are available per zone - Find min/max
        energy consumption across buildings

        '
      summary: Compute statistical aggregations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AggregateRequest'
            examples:
              avg_aqi_per_zone:
                value:
                  data:
                  - id: 1
                    zoneId: Z-CENTRO
                    sensorType: air_quality
                    lastReading: 55.2
                  - id: 5
                    zoneId: Z-NORD
                    sensorType: air_quality
                    lastReading: 185.0
                  field: lastReading
                  operations:
                  - avg
                  - min
                  - max
                  group_by: zoneId
              global_stats:
                value:
                  data:
                  - id: 1
                    fillLevel: 35
                  - id: 2
                    fillLevel: 92
                  - id: 3
                    fillLevel: 100
                  field: fillLevel
                  operations:
                  - avg
                  - max
                  - count
      responses:
        '200':
          description: Aggregation results (flat if no group_by, dict if group_by)
          content:
            application/json:
              schema:
                type: object
              examples:
                grouped_result:
                  value:
                    Z-CENTRO:
                      group: Z-CENTRO
                      count_items: 1
                      avg: 55.2
                      min: 55.2
                      max: 55.2
                    Z-NORD:
                      group: Z-NORD
                      count_items: 1
                      avg: 185.0
                      min: 185.0
                      max: 185.0
                flat_result:
                  value:
                    avg: 75.67
                    max: 100
                    count: 3
        '400':
          description: Invalid request
  /intersect:
    post:
      description: 'Returns items from ''left'' whose value of ''field'' also appears
        in ''right''. Useful for filtering one dataset by presence in another.

        Example use cases: - Find parking spots that are in zones WITH open tourist
        attractions - Find buildings in zones WHERE there is an active pollution alert
        - Find vehicles in zones WHERE there is a traffic incident

        '
      summary: Return items from left that match keys in right
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IntersectRequest'
            examples:
              parking_in_attraction_zones:
                value:
                  left:
                  - id: 101
                    zoneId: Z-CENTRO
                    available: true
                  - id: 104
                    zoneId: Z-NORD
                    available: true
                  - id: 107
                    zoneId: Z-SUD
                    available: false
                  right:
                  - id: 1
                    zoneId: Z-CENTRO
                    name: Arco di Traiano
                    status: open
                  - id: 4
                    zoneId: Z-NORD
                    name: Museo del Sannio
                    status: open
                  field: zoneId
      responses:
        '200':
          description: Items from left present in right
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
              examples:
                result:
                  value:
                  - id: 101
                    zoneId: Z-CENTRO
                    available: true
                  - id: 104
                    zoneId: Z-NORD
                    available: true
        '400':
          description: Invalid request
  /diff:
    post:
      description: 'Returns items from ''left'' whose value of ''field'' does NOT
        appear in ''right''. Useful for finding gaps or mismatches between two datasets.

        Example use cases: - Find zones with high traffic that have NO available charging
        stations - Find zones with open attractions that have NO available parking
        - Find alert zones that have NO emergency units deployed

        '
      summary: Return items from left not present in right
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DiffRequest'
            examples:
              zones_without_chargers:
                value:
                  left:
                  - zoneId: Z-CENTRO
                    congestionLevel: high
                  - zoneId: Z-NORD
                    congestionLevel: critical
                  - zoneId: Z-SUD
                    congestionLevel: medium
                  right:
                  - id: 1
                    zoneId: Z-CENTRO
                    available: true
                  field: zoneId
      responses:
        '200':
          description: Items from left not found in right
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
              examples:
                result:
                  value:
                  - zoneId: Z-NORD
                    congestionLevel: critical
                  - zoneId: Z-SUD
                    congestionLevel: medium
        '400':
          description: Invalid request
  /group:
    post:
      description: 'Groups a list of objects by a field value, returning a dictionary
        where each key is a unique field value and each value is the list of items.
        With count_only=true, returns only the count per group.

        Example use cases: - Group citizen reports by category to see which issues
        are most common - Group parking spots by zoneId to see distribution across
        city - Count vehicles per zone (count_only=true)

        '
      summary: Group items by field value
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupRequest'
            examples:
              group_reports_by_category:
                value:
                  data:
                  - id: 1
                    zoneId: Z-CENTRO
                    category: sanitation
                    status: open
                  - id: 3
                    zoneId: Z-SUD
                    category: lighting
                    status: open
                  - id: 4
                    zoneId: Z-EST
                    category: sanitation
                    status: open
                  by: category
                  count_only: false
              count_by_zone:
                value:
                  data:
                  - id: 101
                    zoneId: Z-CENTRO
                    available: true
                  - id: 104
                    zoneId: Z-NORD
                    available: true
                  - id: 105
                    zoneId: Z-NORD
                    available: true
                  by: zoneId
                  count_only: true
      responses:
        '200':
          description: Dict of grouped items or counts
          content:
            application/json:
              schema:
                type: object
              examples:
                grouped:
                  value:
                    sanitation:
                    - id: 1
                      zoneId: Z-CENTRO
                      category: sanitation
                      status: open
                    - id: 4
                      zoneId: Z-EST
                      category: sanitation
                      status: open
                    lighting:
                    - id: 3
                      zoneId: Z-SUD
                      category: lighting
                      status: open
                counts:
                  value:
                    Z-CENTRO: 1
                    Z-NORD: 2
        '400':
          description: Invalid request
  /rank:
    post:
      description: 'Ranks items using a weighted multi-criteria composite score. Each
        criterion specifies a numeric field, its weight (0-1), and direction (asc=lower
        is better, desc=higher is better). Items are normalized per criterion then
        combined into a single score.

        Example use cases: - Rank parking spots by price (40%) and zone congestion
        (60%) - Rank EV chargers by price per kWh (50%) and available connectors (50%)
        - Rank tourist attractions by wait time (70%) and ticket price (30%)

        '
      summary: Rank items by weighted multi-criteria score
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RankRequest'
            examples:
              rank_parking:
                value:
                  data:
                  - id: 101
                    zoneId: Z-CENTRO
                    pricePerHour: 1.0
                    available: true
                  - id: 104
                    zoneId: Z-NORD
                    pricePerHour: 0.5
                    available: true
                  - id: 107
                    zoneId: Z-SUD
                    pricePerHour: 0.5
                    available: true
                  criteria:
                  - field: pricePerHour
                    weight: 1.0
                    order: asc
                  top: 2
              rank_attractions:
                value:
                  data:
                  - id: 1
                    name: Arco di Traiano
                    waitingTimeMinutes: 0
                    ticketPriceEur: 0.0
                  - id: 2
                    name: Teatro Romano
                    waitingTimeMinutes: 12
                    ticketPriceEur: 3.0
                  - id: 4
                    name: Museo del Sannio
                    waitingTimeMinutes: 5
                    ticketPriceEur: 4.0
                  criteria:
                  - field: waitingTimeMinutes
                    weight: 0.7
                    order: asc
                  - field: ticketPriceEur
                    weight: 0.3
                    order: asc
      responses:
        '200':
          description: Items sorted by composite score (best first)
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
              examples:
                result:
                  value:
                  - id: 104
                    zoneId: Z-NORD
                    pricePerHour: 0.5
                    available: true
                  - id: 107
                    zoneId: Z-SUD
                    pricePerHour: 0.5
                    available: true
        '400':
          description: Invalid request
  /sort:
    post:
      description: 'Sorts a list of objects by a numeric or string field. Supports
        ascending or descending order and optional top-N selection.

        Example use cases: - Find the zone with the lowest AQI reading (sort by lastReading
        asc, top 1) - Find the most expensive parking spots (sort by pricePerHour
        desc) - Find the bin with the highest fill level (sort by fillLevel desc,
        top 1)

        '
      summary: Sort items by field with optional top-N
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SortRequest'
            examples:
              best_air_quality:
                value:
                  data:
                  - id: 1
                    zoneId: Z-CENTRO
                    sensorType: air_quality
                    lastReading: 55.2
                  - id: 5
                    zoneId: Z-NORD
                    sensorType: air_quality
                    lastReading: 185.0
                  by: lastReading
                  order: asc
                  top: 1
              fullest_bins:
                value:
                  data:
                  - id: 1
                    zoneId: Z-CENTRO
                    fillLevel: 35
                  - id: 2
                    zoneId: Z-NORD
                    fillLevel: 92
                  - id: 3
                    zoneId: Z-SUD
                    fillLevel: 100
                  by: fillLevel
                  order: desc
      responses:
        '200':
          description: Sorted list (optionally limited to top N)
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
              examples:
                result:
                  value:
                  - id: 1
                    zoneId: Z-CENTRO
                    sensorType: air_quality
                    lastReading: 55.2
        '400':
          description: Invalid request
  /filter:
    post:
      description: "Filters a list of objects using multiple conditions with AND or\
        \ OR logic. Operators: eq (==), neq (!=), gt (>), gte (>=), lt (<), lte (<=),\n\
        \           in (value in list), contains (string contains substring).\n\n\
        Example use cases: - Find available electric parking spots with price <= 1.5\
        \ (AND) - Find sensors of type air_quality OR noise with alertActive=true\
        \ (OR) - Find buildings with occupancy > 500 and status=operational\n"
      summary: Filter items with multiple conditions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FilterRequest'
            examples:
              available_electric_cheap:
                value:
                  data:
                  - id: 101
                    spotType: standard
                    available: true
                    pricePerHour: 1.0
                  - id: 103
                    spotType: electric
                    available: true
                    pricePerHour: 1.5
                  - id: 110
                    spotType: electric
                    available: true
                    pricePerHour: 1.0
                  conditions:
                  - field: spotType
                    op: eq
                    value: electric
                  - field: available
                    op: eq
                    value: true
                  - field: pricePerHour
                    op: lte
                    value: 1.5
                  logic: and
              alert_sensors:
                value:
                  data:
                  - id: 1
                    sensorType: air_quality
                    alertActive: true
                    lastReading: 185.0
                  - id: 2
                    sensorType: temperature
                    alertActive: false
                    lastReading: 18.2
                  - id: 6
                    sensorType: noise
                    alertActive: true
                    lastReading: 88.5
                  conditions:
                  - field: sensorType
                    op: eq
                    value: air_quality
                  - field: sensorType
                    op: eq
                    value: noise
                  logic: or
      responses:
        '200':
          description: Filtered list of objects matching the conditions
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
              examples:
                result:
                  value:
                  - id: 103
                    spotType: electric
                    available: true
                    pricePerHour: 1.5
                  - id: 110
                    spotType: electric
                    available: true
                    pricePerHour: 1.0
        '400':
          description: Invalid request
  /register:
    post:
      description: Register this microservice with the central discovery system (Consul).
      summary: Register service with discovery system
      responses:
        '200':
          description: Service successfully registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseStatus'
              examples:
                ok:
                  value:
                    status: success
                    httpCode: 200
                    message: Service registered
        '500':
          description: Registration failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseStatus'
              examples:
                fail:
                  value:
                    status: error
                    httpCode: 500
                    message: Unable to register to Consul
