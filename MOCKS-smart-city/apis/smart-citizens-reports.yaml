openapi: 3.0.2
info:
  title: Smart Citizens Reports and Ticketing API
  version: '1.0'
  description: >
    API empowering residents and the Smart City Virtual Assistant to actively participate in urban maintenance. 
    This is the primary action interface for the Help System: it allows the creation, categorization, and tracking of civic issues (tickets).
    Supports cross-domain integration via 'zoneId' to link reports directly to specific city districts (e.g., reporting broken sensors or traffic lights).
  contact:
    name: Smart City Development Team
servers:
  - url: http://localhost:8585/rest/Smart+Citizens+Reports+and+Ticketing+API/1.0
    description: Mock server generated by Microcks
components:
  schemas:
    ResponseStatus:
      type: object
      properties:
        status:
          type: string
        httpCode:
          type: integer
        message:
          type: string
      required:
        - status
        - httpCode
        - message
    CitizenReport:
      allOf:
        - $ref: '#/components/schemas/NewCitizenReport'
        - properties:
            id:
              type: integer
              format: int64
              description: Unique, auto-generated ticket identifier for the citizen report.
          required:
            - id
    NewCitizenReport:
      type: object
      properties:
        zoneId:
          type: string
          description: Standardized city zone identifier where the issue is located (e.g., Z-CENTRO, Z-NORD).
        reporterName:
          type: string
          description: Full name of the citizen or 'Smart City Assistant' if auto-generated by the AI.
        location:
          type: string
          description: Descriptive location or precise address where the reported issue is occurring.
        category:
          type: string
          enum: [sanitation, infrastructure, safety, lighting, traffic, environment, other]
          description: High-level classification of the issue mapping to other city domains.
        description:
          type: string
          description: Detailed textual explanation of the problem, optionally including specific context or hazards.
        status:
          type: string
          enum: [open, in_progress, resolved, closed]
          description: Current lifecycle state of the ticket.
        submittedAt:
          type: string
          format: date-time
          description: ISO-8601 formatted timestamp recording the exact moment the report was received.
      required:
        - zoneId
        - reporterName
        - location
        - category
        - description
        - status
        - submittedAt
paths:
  /health:
    get:
      description: Performs a lightweight health check to verify that the Citizen Reports microservice is operational.
      summary: Health check
      responses:
        '200':
          description: Successful health check response
          content:
            application/json:
              schema:
                type: object
              examples:
                healthy:
                  value: {}
  /citizen-report:
    get:
      description: Retrieves a list of reports. Crucial for the Assistant to check if a specific issue in a zone has already been reported before creating a duplicate ticket.
      summary: Search citizen reports
      parameters:
        - name: zoneId
          in: query
          schema:
            type: string
          description: Filter reports by city zone (e.g., Z-CENTRO)
          examples:
            by_zone_centro:
              value: "Z-CENTRO"
        - name: status
          in: query
          schema:
            type: string
          description: Filter by ticket status (e.g., open, resolved)
          examples:
            by_status_open:
              value: "open"
        - name: category
          in: query
          schema:
            type: string
          description: Filter by issue category (e.g., lighting, sanitation)
      responses:
        "200":
          description: A JSON array containing the collection of citizen reports.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CitizenReport'
              examples:
                example_list:
                  value:
                    - id: 1
                      zoneId: Z-CENTRO
                      reporterName: "Mario Rossi"
                      location: "Piazza Castello, Benevento"
                      category: "sanitation"
                      description: "Cestino traboccante di rifiuti vicino all'ingresso della Rocca dei Rettori."
                      status: "open"
                      submittedAt: "2025-09-24T14:30:00Z"
                    - id: 2
                      zoneId: Z-NORD
                      reporterName: "Giulia Bianchi"
                      location: "Via Posillipo, Benevento"
                      category: "infrastructure"
                      description: "Buca pericolosa e profonda sul manto stradale."
                      status: "in_progress"
                      submittedAt: "2025-09-23T09:15:00Z"
                by_zone_centro:
                  value:
                    - id: 1
                      zoneId: Z-CENTRO
                      reporterName: "Mario Rossi"
                      location: "Piazza Castello, Benevento"
                      category: "sanitation"
                      description: "Cestino traboccante di rifiuti vicino all'ingresso della Rocca dei Rettori."
                      status: "open"
                      submittedAt: "2025-09-24T14:30:00Z"
                by_status_open:
                  value:
                    - id: 1
                      zoneId: Z-CENTRO
                      reporterName: "Mario Rossi"
                      location: "Piazza Castello, Benevento"
                      category: "sanitation"
                      description: "Cestino traboccante di rifiuti vicino all'ingresso della Rocca dei Rettori."
                      status: "open"
                      submittedAt: "2025-09-24T14:30:00Z"
    post:
      description: Submits a new citizen report. This is the primary Actuator endpoint for the Smart City Assistant to escalate issues to human operators.
      summary: Submit new citizen report (Open Ticket)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewCitizenReport'
            examples:
              new_report:
                value:
                  zoneId: Z-CENTRO
                  reporterName: "Smart City Assistant"
                  location: "Ponte Vanvitelli, Benevento"
                  category: "lighting"
                  description: "Segnalazione automatica: Rilevato lampione spento tramite API Sensori, attraversamento pedonale insicuro."
                  status: "open"
                  submittedAt: "2025-09-25T11:00:00Z"
      responses:
        "201":
          description: Citizen report successfully received and ticket created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CitizenReport'
              examples:
                created:
                  value:
                    id: 3
                    zoneId: Z-CENTRO
                    reporterName: "Smart City Assistant"
                    location: "Ponte Vanvitelli, Benevento"
                    category: "lighting"
                    description: "Segnalazione automatica: Rilevato lampione spento tramite API Sensori, attraversamento pedonale insicuro."
                    status: "open"
                    submittedAt: "2025-09-25T11:00:00Z"
  /citizen-report/{id}:
    get:
      description: Fetches the full details and current status of a specific citizen report using its unique ticket ID.
      summary: Get citizen report details by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          examples:
            report_1:
              value: 1
      responses:
        "200":
          description: Detailed information regarding the requested citizen report.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CitizenReport'
              examples:
                report_1:
                  value:
                    id: 1
                    zoneId: Z-CENTRO
                    reporterName: "Mario Rossi"
                    location: "Piazza Castello, Benevento"
                    category: "sanitation"
                    description: "Cestino traboccante di rifiuti vicino all'ingresso della Rocca dei Rettori."
                    status: "open"
                    submittedAt: "2025-09-24T14:30:00Z"
        "404":
          description: The specified report ID does not exist in the database.
    put:
      description: Updates an existing citizen report. Typically used by city officials to update the ticket's resolution status.
      summary: Update citizen report by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          examples:
            updated:
              value: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewCitizenReport'
            examples:
              update:
                value:
                  zoneId: Z-CENTRO
                  reporterName: "Mario Rossi"
                  location: "Piazza Castello, Benevento"
                  category: "sanitation"
                  description: "Cestino traboccante di rifiuti vicino all'ingresso della Rocca dei Rettori - Intervento completato."
                  status: "resolved"
                  submittedAt: "2025-09-24T14:30:00Z"
      responses:
        "200":
          description: Citizen report successfully updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CitizenReport'
              examples:
                updated:
                  value:
                    id: 1
                    zoneId: Z-CENTRO
                    reporterName: "Mario Rossi"
                    location: "Piazza Castello, Benevento"
                    category: "sanitation"
                    description: "Cestino traboccante di rifiuti vicino all'ingresso della Rocca dei Rettori - Intervento completato."
                    status: "resolved"
                    submittedAt: "2025-09-24T14:30:00Z"
        "404":
          description: The specified report ID was not found.
    delete:
      description: Deletes a specific citizen report from the system.
      summary: Delete citizen report by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          examples:
            deleted:
              value: 1
      responses:
        "204":
          description: The report was successfully deleted. No content is returned.
          content:
            text/plain:
              examples:
                deleted:
                  value: "Citizen report deleted"
        "404":
          description: The specified report ID was not found.
  /register:
    post:
      description: Registers this microservice with the central discovery registry.
      summary: Register service to Consul
      responses:
        "200":
          description: Service successfully registered.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseStatus'
              examples:
                ok:
                  value:
                    status: "success"
                    httpCode: 200
                    message: "Service registered"
        "500":
          description: Internal server error preventing successful registration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseStatus'
              examples:
                fail:
                  value:
                    status: "error"
                    httpCode: 500
                    message: "Unable to register to Consul"