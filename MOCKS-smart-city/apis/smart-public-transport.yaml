openapi: 3.0.2
info:
  title: Smart Public Transport and Transit API
  version: '1.0'
  description: >
    API for managing public transport vehicles (buses, trams, metro) and routes across the city.
    Crucial for urban mobility orchestration. Supports dynamic filtering by city zones (zoneId) and operational status.
    Can be used as an actuator to halt or reroute transit services in specific zones during environmental emergencies or severe traffic congestion.
  contact:
    name: Smart City Development Team
servers:
  - url: http://localhost:8585/rest/Smart+Public+Transport+and+Transit+API/1.0
    description: Mock server generated by Microcks
components:
  schemas:
    ResponseStatus:
      type: object
      properties:
        status:
          type: string
        httpCode:
          type: integer
        message:
          type: string
      required:
        - status
        - httpCode
        - message
    Vehicle:
      allOf:
        - $ref: '#/components/schemas/NewVehicle'
        - properties:
            id:
              type: integer
              format: int64
              description: Unique identifier for the vehicle
          required:
            - id
    NewVehicle:
      type: object
      properties:
        zoneId:
          type: string
          description: Standardized city zone identifier where the vehicle is currently located (e.g., Z-CENTRO, Z-NORD)
        routeId:
          type: string
          description: Identifier of the route the vehicle is currently serving
        vehicleType:
          type: string
          enum:
            - bus
            - tram
            - metro
            - ferry
          description: Type of public transport vehicle
        currentLocation:
          type: string
          description: Current GPS-based or stop-based location of the vehicle
        occupancy:
          type: integer
          description: Current number of passengers on board
        capacity:
          type: integer
          description: Maximum passenger capacity of the vehicle
        status:
          type: string
          enum:
            - in-service
            - out-of-service
            - delayed
            - maintenance
            - end-of-line
            - suspended
          description: Current operational status of the vehicle
        lastUpdated:
          type: string
          format: date-time
          description: Timestamp of the last telemetry update
      required:
        - zoneId
        - routeId
        - vehicleType
        - currentLocation
        - occupancy
        - capacity
        - status
        - lastUpdated
paths:
  /health:
    get:
      description: Health check endpoint to verify that the Smart Public Transport microservice is reachable and responsive.
      summary: Health check endpoint
      responses:
        '200':
          description: Successful health check response
          content:
            application/json:
              schema:
                type: object
              examples:
                healthy:
                  value: {}
  /vehicle:
    get:
      description: Retrieve public transport vehicles currently tracked by the system. Use query parameters to easily filter vehicles by city zone or current operational status.
      summary: Search transit vehicles
      parameters:
        - name: zoneId
          in: query
          schema:
            type: string
          description: Filter vehicles by their current city zone ID (e.g., Z-CENTRO)
          examples:
            by_zone_centro:
              value: "Z-CENTRO"
        - name: status
          in: query
          schema:
            type: string
          description: Filter by vehicle status (e.g., delayed, in-service, suspended)
          examples:
            by_status_delayed:
              value: "delayed"
        - name: vehicleType
          in: query
          schema:
            type: string
          description: Filter by type of vehicle (e.g., bus, tram)
      responses:
        '200':
          description: List of vehicles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Vehicle'
              examples:
                example_list:
                  value:
                    - id: 1
                      zoneId: Z-CENTRO
                      routeId: Linea 1
                      vehicleType: bus
                      currentLocation: Stazione FS Centrale, Piazzale Colonna, Benevento
                      occupancy: 38
                      capacity: 75
                      status: in-service
                      lastUpdated: '2025-09-25T10:05:00Z'
                    - id: 2
                      zoneId: Z-NORD
                      routeId: Linea 3
                      vehicleType: bus
                      currentLocation: Viale Mellusi (Fermata Ospedale), Benevento
                      occupancy: 52
                      capacity: 75
                      status: delayed
                      lastUpdated: '2025-09-25T10:02:00Z'
                by_zone_centro:
                  value:
                    - id: 1
                      zoneId: Z-CENTRO
                      routeId: Linea 1
                      vehicleType: bus
                      currentLocation: Stazione FS Centrale, Piazzale Colonna, Benevento
                      occupancy: 38
                      capacity: 75
                      status: in-service
                      lastUpdated: '2025-09-25T10:05:00Z'
                by_status_delayed:
                  value:
                    - id: 2
                      zoneId: Z-NORD
                      routeId: Linea 3
                      vehicleType: bus
                      currentLocation: Viale Mellusi (Fermata Ospedale), Benevento
                      occupancy: 52
                      capacity: 75
                      status: delayed
                      lastUpdated: '2025-09-25T10:02:00Z'
    post:
      description: Register a new public transport vehicle in the city transit system
      summary: Register new vehicle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewVehicle'
            examples:
              new_vehicle:
                value:
                  zoneId: Z-SUD
                  routeId: Linea 16
                  vehicleType: bus
                  currentLocation: Deposito Trotta Bus, Via Santa Colomba, Benevento
                  occupancy: 0
                  capacity: 75
                  status: out-of-service
                  lastUpdated: '2025-09-25T06:00:00Z'
      responses:
        '201':
          description: Vehicle registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vehicle'
              examples:
                created:
                  value:
                    id: 3
                    zoneId: Z-SUD
                    routeId: Linea 16
                    vehicleType: bus
                    currentLocation: Deposito Trotta Bus, Via Santa Colomba, Benevento
                    occupancy: 0
                    capacity: 75
                    status: out-of-service
                    lastUpdated: '2025-09-25T06:00:00Z'
  /vehicle/{id}:
    get:
      description: Retrieve real-time data for a specific public transport vehicle by ID
      summary: Get vehicle details by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          examples:
            vehicle_1:
              value: 1
      responses:
        '200':
          description: Vehicle details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vehicle'
              examples:
                vehicle_1:
                  value:
                    id: 1
                    zoneId: Z-CENTRO
                    routeId: Linea 1
                    vehicleType: bus
                    currentLocation: Stazione FS Centrale, Piazzale Colonna, Benevento
                    occupancy: 38
                    capacity: 75
                    status: in-service
                    lastUpdated: '2025-09-25T10:05:00Z'
        '404':
          description: Vehicle not found
    put:
      description: Update the real-time data of a specific public transport vehicle by ID
      summary: Update vehicle by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          examples:
            updated:
              value: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewVehicle'
            examples:
              update:
                value:
                  zoneId: Z-CENTRO
                  routeId: Linea 1
                  vehicleType: bus
                  currentLocation: Viale Principe di Napoli - Fermata 2, Benevento
                  occupancy: 50
                  capacity: 75
                  status: in-service
                  lastUpdated: '2025-09-25T10:20:00Z'
      responses:
        '200':
          description: Vehicle updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vehicle'
              examples:
                updated:
                  value:
                    id: 1
                    zoneId: Z-CENTRO
                    routeId: Linea 1
                    vehicleType: bus
                    currentLocation: Viale Principe di Napoli - Fermata 2, Benevento
                    occupancy: 50
                    capacity: 75
                    status: in-service
                    lastUpdated: '2025-09-25T10:20:00Z'
        '404':
          description: Vehicle not found
    delete:
      description: Remove a specific public transport vehicle from the registry
      summary: Delete vehicle by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          examples:
            deleted:
              value: 1
      responses:
        '204':
          description: Deleted successfully
          content:
            text/plain:
              examples:
                deleted:
                  value: Vehicle deleted
        '404':
          description: Vehicle not found
  /vehicle/zone/{zoneId}/service-status:
    put:
      description: Dynamically halt, suspend, or resume public transport services across an entire zone. Critical for emergency response (e.g., suspending bus service in Z-CENTRO due to severe flooding or traffic gridlock).
      summary: Update transit service status for a zone
      parameters:
        - name: zoneId
          in: path
          required: true
          schema:
            type: string
          examples:
            zone_centro:
              value: Z-CENTRO
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                newStatus:
                  type: string
                  enum: [in-service, suspended, delayed]
                  description: The new status to apply to all transit vehicles in this zone
                reason:
                  type: string
                  description: Reason for the service change (e.g., SEVERE_WEATHER, EMERGENCY, TRAFFIC_GRIDLOCK)
            examples:
              suspend_service:
                value:
                  newStatus: suspended
                  reason: SEVERE_WEATHER_WARNING
      responses:
        '200':
          description: Service status for the zone updated successfully
          content:
            text/plain:
              examples:
                success:
                  value: Zone service status updated
  /register:
    post:
      description: Register this service to the discovery system (Consul)
      summary: Register service with discovery system
      responses:
        '200':
          description: Registration success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseStatus'
              examples:
                ok:
                  value:
                    status: success
                    httpCode: 200
                    message: Service registered
        '500':
          description: Registration failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseStatus'
              examples:
                fail:
                  value:
                    status: error
                    httpCode: 500
                    message: Unable to register to Consul