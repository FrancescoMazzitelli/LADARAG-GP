openapi: 3.0.2
info:
  title: Smart Parking and Mobility API
  version: '1.0'
  description: >
    API for managing parking spots, lots, and dynamic pricing across the city. 
    Supports searching for available spots by standardized city zones (zoneId).
    Crucial for mobility orchestration and cross-domain reactions, such as dynamically discounting or raising parking prices in specific zones during traffic congestion or pollution events.
  contact:
    name: Smart City Development Team
servers:
  - url: http://localhost:8585/rest/Smart+Parking+and+Mobility+API/1.0
    description: Mock server generated by Microcks
components:
  schemas:
    ResponseStatus:
      type: object
      properties:
        status:
          type: string
        httpCode:
          type: integer
        message:
          type: string
      required:
        - status
        - httpCode
        - message
    ParkingSpot:
      allOf:
        - $ref: '#/components/schemas/NewParkingSpot'
        - properties:
            id:
              type: integer
              format: int64
              description: Unique identifier for the parking spot
          required:
            - id
    NewParkingSpot:
      type: object
      properties:
        zoneId:
          type: string
          description: Standardized city zone identifier (e.g., Z-CENTRO, Z-NORD)
        location:
          type: string
          description: Physical location or parking lot name of the spot
        available:
          type: boolean
          description: Whether the spot is currently available
        spotType:
          type: string
          enum:
            - standard
            - disabled
            - electric
            - motorcycle
            - reserved
          description: Type of parking spot
        pricePerHour:
          type: number
          format: float
          description: Hourly parking rate in local currency
        status:
          type: string
          enum:
            - free
            - occupied
            - reserved
            - maintenance
          description: Current operational status of the parking spot
        lastUpdated:
          type: string
          format: date-time
          description: Timestamp of the last status update
      required:
        - zoneId
        - location
        - available
        - spotType
        - pricePerHour
        - status
        - lastUpdated
paths:
  /health:
    get:
      description: Health check endpoint to verify that the Smart Parking microservice is reachable and responsive.
      summary: Health check endpoint
      responses:
        '200':
          description: Successful health check response
          content:
            application/json:
              schema:
                type: object
              examples:
                healthy:
                  value: {}
  /parking-spot:
    get:
      description: Retrieve parking spots registered in the city. Use query parameters to quickly find available spots or filter by a specific city zone.
      summary: Search parking spots
      parameters:
        - name: zoneId
          in: query
          schema:
            type: string
          description: Filter parking spots by a specific zone ID (e.g., Z-CENTRO)
          examples:
            by_zone_centro:
              value: "Z-CENTRO"
        - name: available
          in: query
          schema:
            type: boolean
          description: Filter by availability status (true to show only empty spots)
          examples:
            available_true:
              value: true
      responses:
        '200':
          description: List of parking spots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ParkingSpot'
              examples:
                example_list:
                  value:
                    - id: 101
                      zoneId: Z-CENTRO
                      location: Parcheggio Piazza Risorgimento, Stallo A12, Benevento
                      available: true
                      spotType: standard
                      pricePerHour: 1.0
                      status: free
                      lastUpdated: '2025-09-25T10:00:00Z'
                    - id: 102
                      zoneId: Z-NORD
                      location: Parcheggio Via del Pomerio (Arco di Traiano), Stallo B03, Benevento
                      available: false
                      spotType: disabled
                      pricePerHour: 0.0
                      status: occupied
                      lastUpdated: '2025-09-25T09:30:00Z'
                by_zone_centro:
                  value:
                    - id: 101
                      zoneId: Z-CENTRO
                      location: Parcheggio Piazza Risorgimento, Stallo A12, Benevento
                      available: true
                      spotType: standard
                      pricePerHour: 1.0
                      status: free
                      lastUpdated: '2025-09-25T10:00:00Z'
                available_true:
                  value:
                    - id: 101
                      zoneId: Z-CENTRO
                      location: Parcheggio Piazza Risorgimento, Stallo A12, Benevento
                      available: true
                      spotType: standard
                      pricePerHour: 1.0
                      status: free
                      lastUpdated: '2025-09-25T10:00:00Z'
    post:
      description: Register a new parking spot in the city mobility system, specifying zone, location, spot type, hourly price and current availability
      summary: Register new parking spot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewParkingSpot'
            examples:
              new_spot:
                value:
                  zoneId: Z-CENTRO
                  location: Parcheggio Viale Mellusi, Stallo C05, Benevento
                  available: true
                  spotType: electric
                  pricePerHour: 1.5
                  status: free
                  lastUpdated: '2025-09-25T11:00:00Z'
      responses:
        '201':
          description: Parking spot created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParkingSpot'
              examples:
                created:
                  value:
                    id: 103
                    zoneId: Z-CENTRO
                    location: Parcheggio Viale Mellusi, Stallo C05, Benevento
                    available: true
                    spotType: electric
                    pricePerHour: 1.5
                    status: free
                    lastUpdated: '2025-09-25T11:00:00Z'
  /parking-spot/{id}:
    get:
      description: Retrieve the current availability and details of a specific parking spot by ID
      summary: Get parking spot details by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          examples:
            spot_1:
              value: 101
      responses:
        '200':
          description: Parking spot details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParkingSpot'
              examples:
                spot_1:
                  value:
                    id: 101
                    zoneId: Z-CENTRO
                    location: Parcheggio Piazza Risorgimento, Stallo A12, Benevento
                    available: true
                    spotType: standard
                    pricePerHour: 1.0
                    status: free
                    lastUpdated: '2025-09-25T10:00:00Z'
        '404':
          description: Parking spot not found
    put:
      description: Update the status or configuration of a specific parking spot by ID, such as availability, occupancy status, price per hour or spot type
      summary: Update parking spot by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          examples:
            updated:
              value: 101
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewParkingSpot'
            examples:
              update:
                value:
                  zoneId: Z-CENTRO
                  location: Parcheggio Piazza Risorgimento, Stallo A12, Benevento
                  available: false
                  spotType: standard
                  pricePerHour: 1.0
                  status: occupied
                  lastUpdated: '2025-09-25T11:15:00Z'
      responses:
        '200':
          description: Parking spot updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParkingSpot'
              examples:
                updated:
                  value:
                    id: 101
                    zoneId: Z-CENTRO
                    location: Parcheggio Piazza Risorgimento, Stallo A12, Benevento
                    available: false
                    spotType: standard
                    pricePerHour: 1.0
                    status: occupied
                    lastUpdated: '2025-09-25T11:15:00Z'
        '404':
          description: Parking spot not found
    delete:
      description: Remove a specific parking spot from the city mobility registry by its ID
      summary: Delete parking spot by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          examples:
            deleted:
              value: 101
      responses:
        '204':
          description: Deleted successfully
          content:
            text/plain:
              examples:
                deleted:
                  value: Parking spot deleted
        '404':
          description: Parking spot not found
  /parking-spot/zone/{zoneId}/pricing:
    put:
      description: Dynamically adjust the hourly parking rate for all spots in a specific zone. Useful for reacting to traffic congestion or pollution alerts by incentivizing or discouraging parking.
      summary: Update pricing for an entire zone
      parameters:
        - name: zoneId
          in: path
          required: true
          schema:
            type: string
          examples:
            zone_centro:
              value: Z-CENTRO
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                newPricePerHour:
                  type: number
                  format: float
                  description: The new hourly rate to apply
                reason:
                  type: string
                  description: Reason for the price update (e.g., HIGH_POLLUTION_INCENTIVE, CONGESTION_CHARGE)
            examples:
              smog_discount:
                value:
                  newPricePerHour: 0.50
                  reason: HIGH_POLLUTION_INCENTIVE
      responses:
        '200':
          description: Zone pricing updated successfully
          content:
            text/plain:
              examples:
                success:
                  value: Zone pricing updated
  /register:
    post:
      description: Register this service to the discovery system (Consul) to make it available for other city infrastructure components
      summary: Register service with discovery system
      responses:
        '200':
          description: Registration success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseStatus'
              examples:
                ok:
                  value:
                    status: success
                    httpCode: 200
                    message: Service registered
        '500':
          description: Registration failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseStatus'
              examples:
                fail:
                  value:
                    status: error
                    httpCode: 500
                    message: Unable to register to Consul