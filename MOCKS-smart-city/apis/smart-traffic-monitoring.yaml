openapi: 3.0.2
info:
  title: Smart Traffic and Road Monitoring API
  version: '1.0'
  description: >
    API for managing traffic flows, detecting incidents, and enforcing road regulations across the city.
    Compatible with cross-domain orchestration: use this service to query congestion levels in specific zones (zoneId) or to act as an actuator (e.g., dynamically lowering speed limits in response to pollution alerts from the Sensors API).
  contact:
    name: Smart City Development Team
servers:
  - url: http://localhost:8585/rest/Smart+Traffic+and+Road+Monitoring+API/1.0
    description: Mock server generated by Microcks
components:
  schemas:
    ResponseStatus:
      type: object
      properties:
        status:
          type: string
        httpCode:
          type: integer
        message:
          type: string
      required:
        - status
        - httpCode
        - message
    TrafficSensor:
      allOf:
        - $ref: '#/components/schemas/NewTrafficSensor'
        - properties:
            id:
              type: integer
              format: int64
              description: Unique identifier for the traffic sensor
          required:
            - id
    NewTrafficSensor:
      type: object
      properties:
        zoneId:
          type: string
          description: Standardized city zone identifier (e.g., Z-CENTRO, Z-NORD)
        location:
          type: string
          description: Physical location or intersection of the traffic sensor
        active:
          type: boolean
          description: Whether the sensor is currently active
        speedLimit:
          type: integer
          description: Current legal speed limit enforced at the sensor location in km/h
        averageSpeed:
          type: number
          format: float
          description: Average vehicle speed detected in km/h
        vehicleCount:
          type: integer
          description: Number of vehicles detected in the last measurement interval
        congestionLevel:
          type: string
          enum:
            - low
            - medium
            - high
            - critical
          description: Current congestion level detected
        incidentDetected:
          type: boolean
          description: True if a traffic incident (crash, stalled vehicle) has been detected
        lastUpdated:
          type: string
          format: date-time
          description: Timestamp of the last sensor update
      required:
        - zoneId
        - location
        - active
        - speedLimit
        - averageSpeed
        - vehicleCount
        - congestionLevel
        - incidentDetected
        - lastUpdated
paths:
  /health:
    get:
      description: Health check endpoint to verify that the Smart Traffic Monitoring microservice is reachable and responsive.
      summary: Health check endpoint
      responses:
        '200':
          description: Successful health check response
          content:
            application/json:
              schema:
                type: object
              examples:
                healthy:
                  value: {}
  /traffic-sensor:
    get:
      description: Retrieve traffic sensors deployed across the city. Use query parameters to filter by zone, congestion levels, or active incidents.
      summary: Search traffic sensors
      parameters:
        - name: zoneId
          in: query
          schema:
            type: string
          description: Filter traffic sensors by a specific zone ID (e.g., Z-CENTRO)
          examples:
            by_zone_centro:
              value: "Z-CENTRO"
        - name: congestionLevel
          in: query
          schema:
            type: string
          description: Filter by congestion status (e.g., high, critical)
          examples:
            by_congestion_high:
              value: "high"
        - name: incidentDetected
          in: query
          schema:
            type: boolean
          description: Filter locations where an incident is currently active
      responses:
        '200':
          description: List of traffic sensors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TrafficSensor'
              examples:
                example_list:
                  value:
                    - id: 1
                      zoneId: Z-CENTRO
                      location: Ponte Vanvitelli, Benevento
                      active: true
                      speedLimit: 50
                      averageSpeed: 22.5
                      vehicleCount: 210
                      congestionLevel: high
                      incidentDetected: false
                      lastUpdated: '2025-09-25T10:15:30Z'
                    - id: 2
                      zoneId: Z-NORD
                      location: Rotonda dei Pentri, Benevento
                      active: true
                      speedLimit: 50
                      averageSpeed: 45.0
                      vehicleCount: 85
                      congestionLevel: low
                      incidentDetected: false
                      lastUpdated: '2025-09-25T09:45:00Z'
                by_zone_centro:
                  value:
                    - id: 1
                      zoneId: Z-CENTRO
                      location: Ponte Vanvitelli, Benevento
                      active: true
                      speedLimit: 50
                      averageSpeed: 22.5
                      vehicleCount: 210
                      congestionLevel: high
                      incidentDetected: false
                      lastUpdated: '2025-09-25T10:15:30Z'
                by_congestion_high:
                  value:
                    - id: 1
                      zoneId: Z-CENTRO
                      location: Ponte Vanvitelli, Benevento
                      active: true
                      speedLimit: 50
                      averageSpeed: 22.5
                      vehicleCount: 210
                      congestionLevel: high
                      incidentDetected: false
                      lastUpdated: '2025-09-25T10:15:30Z'
    post:
      description: Register a new traffic monitoring sensor in the city traffic control system
      summary: Register new traffic sensor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewTrafficSensor'
            examples:
              new_sensor:
                value:
                  zoneId: Z-CENTRO
                  location: Viale Principe di Napoli (Stazione Centrale), Benevento
                  active: true
                  speedLimit: 50
                  averageSpeed: 30.0
                  vehicleCount: 120
                  congestionLevel: medium
                  incidentDetected: false
                  lastUpdated: '2025-09-25T10:00:00Z'
      responses:
        '201':
          description: Traffic sensor created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrafficSensor'
              examples:
                created:
                  value:
                    id: 3
                    zoneId: Z-CENTRO
                    location: Viale Principe di Napoli (Stazione Centrale), Benevento
                    active: true
                    speedLimit: 50
                    averageSpeed: 30.0
                    vehicleCount: 120
                    congestionLevel: medium
                    incidentDetected: false
                    lastUpdated: '2025-09-25T10:00:00Z'
  /traffic-sensor/{id}:
    get:
      description: Retrieve real-time traffic data from a specific sensor by ID
      summary: Get traffic sensor by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          examples:
            sensor_1:
              value: 1
      responses:
        '200':
          description: Traffic sensor details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrafficSensor'
              examples:
                sensor_1:
                  value:
                    id: 1
                    zoneId: Z-CENTRO
                    location: Ponte Vanvitelli, Benevento
                    active: true
                    speedLimit: 50
                    averageSpeed: 22.5
                    vehicleCount: 210
                    congestionLevel: high
                    incidentDetected: false
                    lastUpdated: '2025-09-25T10:15:30Z'
        '404':
          description: Traffic sensor not found
    put:
      description: Update the data of a specific traffic sensor by ID
      summary: Update traffic sensor by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          examples:
            updated:
              value: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewTrafficSensor'
            examples:
              update:
                value:
                  zoneId: Z-CENTRO
                  location: Ponte Vanvitelli, Benevento
                  active: true
                  speedLimit: 30
                  averageSpeed: 5.0
                  vehicleCount: 300
                  congestionLevel: critical
                  incidentDetected: true
                  lastUpdated: '2025-09-25T11:00:00Z'
      responses:
        '200':
          description: Traffic sensor updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrafficSensor'
              examples:
                updated:
                  value:
                    id: 1
                    zoneId: Z-CENTRO
                    location: Ponte Vanvitelli, Benevento
                    active: true
                    speedLimit: 30
                    averageSpeed: 5.0
                    vehicleCount: 300
                    congestionLevel: critical
                    incidentDetected: true
                    lastUpdated: '2025-09-25T11:00:00Z'
        '404':
          description: Traffic sensor not found
    delete:
      description: Remove a specific traffic monitoring sensor
      summary: Delete traffic sensor by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          examples:
            deleted:
              value: 1
      responses:
        '204':
          description: Deleted successfully
          content:
            text/plain:
              examples:
                deleted:
                  value: Traffic sensor deleted
        '404':
          description: Traffic sensor not found
  /traffic-sensor/zone/{zoneId}/speed-limit:
    put:
      description: Dynamically enforce a new speed limit on digital road signs for an entire city zone. Use this to react to environmental hazards (like high pollution) or traffic congestion.
      summary: Enforce speed limit in a zone
      parameters:
        - name: zoneId
          in: path
          required: true
          schema:
            type: string
          examples:
            zone_centro:
              value: Z-CENTRO
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                speedLimit:
                  type: integer
                  description: The new speed limit in km/h to enforce
                reason:
                  type: string
                  description: Reason for the change (e.g., HIGH_POLLUTION, CONGESTION, ACCIDENT)
            examples:
              smog_limit:
                value:
                  speedLimit: 30
                  reason: HIGH_POLLUTION
      responses:
        '200':
          description: Speed limit successfully enforced in the zone
          content:
            text/plain:
              examples:
                success:
                  value: Zone speed limit updated
  /register:
    post:
      description: Register this service to the discovery system (Consul)
      summary: Register service with discovery system
      responses:
        '200':
          description: Registration success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseStatus'
              examples:
                ok:
                  value:
                    status: success
                    httpCode: 200
                    message: Service registered
        '500':
          description: Registration failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseStatus'
              examples:
                fail:
                  value:
                    status: error
                    httpCode: 500
                    message: Unable to register to Consul